<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: url("img/IMG-20260502-WA0016.jpg") no-repeat center center/cover;
      height: 100vh;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      color: #000;
    }

    .login-box img {
      width: 70px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    /* 🔥 INPUTS ARREGLADOS */
    .form-control {
      border-radius: 50px;
      padding: 10px;
      border: none;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(5px);
      color: #000;
    }

    .form-control::placeholder {
      color: #555;
    }

    .form-control:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(61, 95, 43, 0.5);
      background: rgba(255, 255, 255, 0.8);
    }

    .btn-login {
      background-color: #3d5f2b;
      color: white;
      border-radius: 50px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .btn-login:hover {
      background-color: #2f4a20;
    }

    .social-btn {
      border-radius: 50px;
      background: #ddd;
      border: none;
      padding: 5px 15px;
      margin: 5px;
    }

    .links {
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="d-flex justify-content-center align-items-center vh-100">
  <div class="login-box text-center">

    <img src="img/IMG-20260417-WA0021.jpg" alt="logo">

    <input type="text" class="form-control mb-3" placeholder="Email or username">
    <input type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-login w-100 mb-3">LOGIN</button>

    <p>Or login with</p>

    <div>
      <button class="social-btn">Outlook</button>
      <button class="social-btn">Gmail</button>
    </div>

    <div class="links mt-3">
      Create account · Sign up now
    </div>

  </div>
</div>

</body>
</html>
